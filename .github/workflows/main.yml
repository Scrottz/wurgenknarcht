name: Deploy Wurgenknarcht Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "index.html,geschichte.html,gaestebuch.html,webring-next.html,tagebuch.html,impressum.html,css/,img/"
          target: "/www/htdocs/w016db5f/wurgenknarcht.at"
          strip_components: 0
